<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Visitas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <header class="header">
      <div class="badge">✦ Bienvenido</div>
      <h1>Registro de Visitas</h1>
      <p>Dejá tu huella — escribí un mensaje y aparecerá para todos los visitantes.</p>
    </header>

    <div class="form-card">
      <h2>✍ Nuevo mensaje</h2>
      <form id="visitForm">
        <div class="form-group">
          <label for="name">Tu nombre</label>
          <input type="text" id="name" placeholder="Ej: María García" maxlength="100" required />
        </div>
        <div class="form-group">
          <label for="message">Tu mensaje</label>
          <textarea id="message" placeholder="Escribí algo para los demás visitantes..." maxlength="300" required></textarea>
        </div>
        <button type="submit" id="submitBtn">Dejar mi mensaje →</button>
        <p id="formStatus" class="status"></p>
      </form>
    </div>

    <div class="messages-header">
      <h2>Mensajes de visitantes</h2>
      <span class="count-badge" id="countBadge">0</span>
    </div>

    <div id="visitsList">
      <div class="state-message">
        <div class="icon">⏳</div>
        <p>Cargando mensajes...</p>
      </div>
    </div>

  </div>

  <footer>
    Hecho con AWS · Lambda · DynamoDB · CloudFront
  </footer>

  <script src="app.js"></script>
</body>
</html>
