<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Visitas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📋 Registro de Visitas</h1>
    <p class="subtitle">Dejá tu nombre y un mensaje para que todos lo vean</p>

    <form id="visitForm">
      <div class="form-group">
        <label for="name">Tu nombre</label>
        <input type="text" id="name" placeholder="Ej: Juan Pérez" maxlength="100" required />
      </div>
      <div class="form-group">
        <label for="message">Tu mensaje</label>
        <textarea id="message" placeholder="Escribí algo..." maxlength="300" required></textarea>
      </div>
      <button type="submit" id="submitBtn">Dejar mensaje</button>
      <p id="formStatus" class="status"></p>
    </form>

    <hr />

    <h2>Mensajes de visitantes</h2>
    <div id="visitsList">
      <p class="loading">Cargando mensajes...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
